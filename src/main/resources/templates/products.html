<!DOCTYPE html>
<html lang="ja">
<head>
  <title>商品一覧</title>

  <style>
    body{
      font-family: sans-serif;
      width: 800px;
      margin:40px auto;
    }

    h1{
      text-align: center;
    }
               table{
                  width:100%;
                  border-collapse: collapse;
              }

        th,td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        form{
            margin-top: 40px;
            padding: 20px;
            border-radius: 8px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button{
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<h1>商品一覧</h1>

<table>

    <tr>
        <th>ID</th>
        <th>商品名</th>
        <th>価格</th>
    </tr>

    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.price} + ' 円'"></td>
    </tr>

</table>

<form action="/products" method="post">
    <h2>商品登録</h2>
    <label>商品名</label>
    <input type="text" name="name">
    <label>価格</label>
    <input type="number" name="price">
    <button type="submit">登録</button>
</form>

</body>
</html>
