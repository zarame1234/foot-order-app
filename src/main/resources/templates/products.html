<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>商品一覧</title>
</head>

<body> 
  <div class="container mt-4">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/products}">
            モバイルオーダー
      </a>
      <div class="navbar-nav">
        <a class="nav-link" th:href="@{/products}">TopPage</a>
        <a class="nav-link" th:href="@{/cart}">カート</a>
        <a class="nav-link" th:href="@{/order-history}">注文履歴</a>
      </div>
    </div>
    </nav>
  <hr>

  <h1 class="mb-4">商品一覧</h1>
  <table class="table table-hover align-middle">
    <tr>
      <th>商品名</th>
      <th>価格</th>
    </tr>

    <tr th:each="product : ${products}">
      <td>
        <a th:href="@{/products/{id}(id=${product.id})}"
           th:text="${product.name}">
        </a>
      </td>
      <td th:text="${product.price} + ' 円'"></td>
    </tr>
  </table>
  </div>
</body>
</html>
