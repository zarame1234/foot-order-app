<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>商品詳細</title>
</head>
<body>
  <h1>商品詳細</h1>
  <p>商品ID：<span th:text="${product.id}"></span></p>

  <p>価格：<span th:text="${product.price}"></span></p>
  <a th:href="@{/products}">
    一覧へ戻る
  </a>
</body>
</html>
